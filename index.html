<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F19" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dlesei0kn/image/upload/v1778091387/siteiconmain_jfmywn.jpg" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dlesei0kn/image/upload/v1778091387/siteiconmain_jfmywn.jpg" />

    <!-- Performance -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Theme Script (no change) -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
